services:
  - type: web
    name: tiktok-label-printer
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: APP_TOKEN
        sync: false
      - key: AGENT_TOKEN
        sync: false
      - key: TIKTOK_WEBHOOK_SECRET
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
